server {
    listen       80;
    server_name  localhost;

    # Servir archivos estáticos de React (Frontend)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # CONFIGURACIÓN DE PROXY PARA RAILWAY
    # Redirigir peticiones /api/ al servidor backend real
    location /api/ {
        proxy_pass https://chefcommunity-production.up.railway.app/api/;
        proxy_set_header Host chefcommunity-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirigir peticiones /static/ (imágenes) al servidor backend real
    location /static/ {
        proxy_pass https://chefcommunity-production.up.railway.app/static/;
        proxy_set_header Host chefcommunity-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
